name: PR Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT }}
        run: mvn -B test -s settings.xml
